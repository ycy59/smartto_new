name: smartto_new
description: SMARTTO - Focus Your Study App

publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  file_picker: ^10.3.10
  flutter:
    sdk: flutter
  shared_preferences: ^2.5.5
  smooth_page_indicator: ^1.1.0
  sqflite: ^2.3.2
  sqflite_common: ^2.5.0
  sqflite_common_ffi: ^2.3.0
  sqflite_common_ffi_web: ^1.1.1
  path: ^1.9.0
  uuid: ^4.4.0
  flutter_riverpod: ^2.5.1
  camera: ^0.11.0+2
  # ── 집중도 측정 (face landmark + ONNX 추론) ──────────────────────────────
  # MediaPipe Face Mesh 468 + Iris 152 (학습 코드와 동일한 좌표계)
  face_detection_tflite: ^6.2.4
  # XGBoost 모델 추론 (Smartto_ml 에서 학습한 xgb_model.onnx 실행)
  onnxruntime: ^1.4.1
  # 모델 파일 임시 디렉토리 추출용
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/tomato_glasses.png
    - assets/images/tomato_splash.png
    - assets/images/icon_university.jpg
    - assets/images/icon_exam.jpg
    - assets/images/icon_growth.jpg
    - assets/images/twemoji_tomato.png
    - assets/images/twemoji_tomato-1.png
    - assets/images/twemoji_tomato-2.png
    - assets/images/twemoji_tomato-3.png
    # 집중도 측정 ONNX 모델 (Smartto_ml/models/xgb_model.onnx 사본)
    - assets/models/xgb_model.onnx
