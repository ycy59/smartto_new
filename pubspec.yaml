name: smartto_new
description: SMARTTO - Focus Your Study App
 
publish_to: 'none'
version: 1.0.0+1
 
environment:
  sdk: '>=3.0.0 <4.0.0'
 
dependencies:
  file_picker: ^10.3.10
  flutter:
    sdk: flutter
  shared_preferences: ^2.5.5
  smooth_page_indicator: ^1.1.0
  sqflite: ^2.3.2
  path: ^1.9.0
  uuid: ^4.4.0
  flutter_riverpod: ^2.5.1
 
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/tomato_glasses.png
    - assets/images/tomato_splash.png
    - assets/images/icon_university.jpg
    - assets/images/icon_exam.jpg
    - assets/images/icon_growth.jpg